name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run pytest
        run: python -m pytest -q

      - name: Run menu integration script
        run: |
          if [ -f auto_menu_test.sh ]; then
            chmod +x auto_menu_test.sh
            ./auto_menu_test.sh
          else
            echo "auto_menu_test.sh introuvable"
            exit 1
          fi
